services:
  backend:
    build: .
    image: pkgdos-backend:latest
    container_name: pkgdos-backend
    restart: always
    # network_mode host => el contenedor escucha en host:5001 (para que nginx lo proxee)
    # y DATABASE_URL=localhost:5432 apunta al Postgres del host cuando lo montes.
    network_mode: host
    env_file:
      - .env
