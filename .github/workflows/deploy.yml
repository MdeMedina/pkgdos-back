name: Deploy Backend to Production

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          script: |
            cd ${{ secrets.SSH_PATH }}
            git pull origin master

            # Build the new backend image.
            docker compose build

            # Apply Prisma migrations ONLY if a migrations folder exists.
            # `migrate deploy` is non-destructive (applies versioned migrations,
            # never resets/drops). No-op today (schema is hand-managed, no
            # prisma/migrations dir) so it can't break the deploy; auto-runs if
            # prisma migrations are adopted later.
            if [ -d prisma/migrations ] && [ -n "$(ls -A prisma/migrations 2>/dev/null)" ]; then
              docker compose run --rm --no-deps backend npx prisma migrate deploy
            fi

            # Recreate ONLY the backend service. The DB lives in
            # docker-compose.db.yml (separate project) and is never touched.
            docker compose up -d
