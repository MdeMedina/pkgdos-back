services:
  pkgd-db:
    image: pgvector/pgvector:pg16
    container_name: pkgdos-db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: pkgd_os
    # Publicado solo en loopback del host => coincide con DATABASE_URL=localhost:5432
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - pkgd_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d pkgd_os"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pkgd_db_data:
